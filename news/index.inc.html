<!-- ABOUT -->
<div class="news-page about-page">

    <link href="news/news.css" rel="stylesheet">

    <style>
        .about-page {
            background: linear-gradient(180deg, #f7f7f7 0%, #ffffff 54%, #f5f2eb 100%);
        }

        .about-page .container {
            max-width: 1180px;
        }

        .about-section {
            background: #ffffff;
            border: 1px solid #e5dfd2;
            border-radius: 8px;
            box-shadow: 0 14px 34px rgba(33, 33, 33, 0.08);
            padding: 22px;
            margin-bottom: 28px;
        }

        .about-section__header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eadfca;
        }

        .about-section__title {
            font-size: 22px;
            font-weight: 700;
            color: #202124;
            margin: 0 0 4px;
        }

        .about-section__subtitle {
            font-size: 14px;
            color: #666;
            margin: 0;
        }

        .about-video-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
        }

        .about-video-card {
            min-width: 0;
        }

        .about-video-card h3 {
            font-size: 15px;
            line-height: 1.35;
            margin: 0 0 10px;
            color: #202124;
            min-height: 42px;
        }

        .about-video-frame {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            background: #111;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .about-video-frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .about-video-cta {
            margin-top: 12px;
        }

        .about-video-cta .btn {
            width: 100%;
            min-height: 38px;
            font-size: 13px;
            font-weight: 700;
        }

        .about-news-section .news-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        @media (max-width: 1100px) {
            .about-video-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 700px) {
            .about-section {
                padding: 16px;
            }

            .about-section__header {
                align-items: flex-start;
                flex-direction: column;
            }

            .about-video-grid,
            .about-news-section .news-grid {
                grid-template-columns: 1fr;
            }

            .about-video-card h3 {
                min-height: 0;
            }
        }
    </style>

    <div class="container">
        <div class="news-header">

            <p class="news-subtitle" data-i18n="aboutPage.subtitle">Videos, news, and articles from NALA</p>
        </div>

                            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"

                    <div class="about-video-frame">
                        <iframe src="https://player.vimeo.com/video/1106503213?title=0&amp;byline=0&amp;portrait=0&amp;badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479"
                            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            title="Train for Real Locksmith Work" data-i18n-title="aboutPage.video.work"></iframe>

                    <div class="about-video-cta">

            </div>
        </section>

        <section class="about-section about-news-section" aria-labelledby="aboutArticlesTitle">
            <div class="about-section__header">
                <div>
                    <h2 class="about-section__title" id="aboutArticlesTitle" data-i18n="aboutPage.articles.title">News &amp; Articles</h2>
                    <p class="about-section__subtitle" data-i18n="aboutPage.articles.subtitle">Browse recent updates and industry notes.</p>
                </div>
            </div>

            <div class="news-grid" id="newsGrid"></div>
        </section>
    </div>
