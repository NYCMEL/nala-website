<!-- NEWS & ARTICLES -->
<div class="news-page">

    <link href="news/news.css" rel="stylesheet">
    <script src="https://player.vimeo.com/api/player.js"></script>

    <style>
        .news-three-col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            align-items: start;
        }
        .news-col-videos {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 80px;
        }
        .news-video-item {
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .news-video-wrap {
            padding: 56.25% 0 0;
            position: relative;
        }
        .news-video-wrap iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .news-video-label {
            background: #111;
            color: #adb5bd;
            font-size: 11px;
            padding: 6px 10px;
            text-align: center;
        }
        .news-col-articles { min-width: 0; }

        @media (max-width: 767px) {
            .news-three-col { grid-template-columns: 1fr; }
            .news-col-videos { position: static; }
        }
    </style>

    <div class="container">
        <div class="news-header">
            <h1 class="news-title">News &amp; Articles</h1>
            <p class="news-subtitle">Stay up to date with the latest from NALA</p>
        </div>

        <div class="news-three-col">

            <!-- COLUMN 1: 3 videos stacked -->
            <div class="news-col-videos">

                <div class="news-video-item">
                    <div class="news-video-wrap">
                        <iframe src="https://player.vimeo.com/video/1106503990?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479"
                            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            title="Safe Lockout - updated"></iframe>
                    </div>
                    <div class="news-video-label">Safe Lockout</div>
                </div>

                <div class="news-video-item">
                    <div class="news-video-wrap">
                        <iframe src="https://player.vimeo.com/video/1106503753?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479"
                            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            title="Marketing Video 3.2 updated"></iframe>
                    </div>
                    <div class="news-video-label">Marketing Video 3.2</div>
                </div>

                <div class="news-video-item">
                    <div class="news-video-wrap">
                        <iframe src="https://player.vimeo.com/video/1106503213?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479"
                            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            title="Marketing Video 1.3 updated"></iframe>
                    </div>
                    <div class="news-video-label">Marketing Video 1.3</div>
                </div>

            </div>

            <!-- COLUMN 2 -->
            <div class="news-col-articles" id="newsGridCol2"></div>

            <!-- COLUMN 3 -->
            <div class="news-col-articles" id="newsGridCol3"></div>

        </div>
    </div>

    <!-- Hidden: news.js renders here; we clone cards into col2/col3 -->
    <div style="position:absolute;visibility:hidden;height:0;overflow:hidden">
        <div class="news-grid" id="newsGrid"></div>
    </div>

</div><!-- /.news-page -->

<script>
(function() {
    function distributeArticles() {
        var grid = document.getElementById('newsGrid');
        var col2 = document.getElementById('newsGridCol2');
        var col3 = document.getElementById('newsGridCol3');
        if (!grid || !col2 || !col3) return;

        var cards = Array.from(grid.querySelectorAll('.news-card'));
        if (!cards.length) return;

        col2.innerHTML = '';
        col3.innerHTML = '';

        cards.forEach(function(card, i) {
            var clone = card.cloneNode(true);
            (i % 2 === 0 ? col2 : col3).appendChild(clone);
        });

        // Re-bind Read More on clones — proxy click to original
        [col2, col3].forEach(function(col) {
            col.querySelectorAll('.news-card__link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var orig = grid.querySelector('.news-card__link[data-article-id="' + link.dataset.articleId + '"]');
                    if (orig) orig.click();
                });
            });
        });
    }

    // Subscribe to news:grid-rendered event fired by news.js
    function trySubscribe() {
        if (typeof wc !== 'undefined' && wc.subscribe) {
            wc.subscribe('news:grid-rendered', function() {
                setTimeout(distributeArticles, 50);
            });
            return true;
        }
        return false;
    }

    if (!trySubscribe()) {
        var poll = setInterval(function() { if (trySubscribe()) clearInterval(poll); }, 100);
    }

    // Fallback safety net
    setTimeout(distributeArticles, 1000);
})();
</script>

<script src="news/news.config.js"></script>
<script src="news/news.js"></script>
