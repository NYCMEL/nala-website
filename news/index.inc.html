<!-- ABOUT -->
<div class="news-page about-page">

    <link href="news/news.css" rel="stylesheet">

    <style>
        .about-page {
            background: linear-gradient(180deg, #f7f7f7 0%, #ffffff 54%, #f5f2eb 100%);
        }

        .about-page .container {
            max-width: 1180px;
        }

        .about-section {
            background: #ffffff;
            border: 1px solid #e5dfd2;
            border-radius: 8px;
            box-shadow: 0 14px 34px rgba(33, 33, 33, 0.08);
            padding: 22px;
            margin-bottom: 28px;
        }

        .about-section__header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #eadfca;
        }

        .about-section__title {
            font-size: 22px;
            font-weight: 700;
            color: #202124;
            margin: 0 0 4px;
        }

        .about-section__subtitle {
            font-size: 14px;
            color: #666;
            margin: 0;
        }

        .about-featured-video {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .about-featured-video__frame {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            background: #111;
            box-shadow: 0 16px 38px rgba(33, 33, 33, 0.16);
        }

        .about-featured-video__frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .about-featured-video__caption {
            margin: 0;
            color: #202124;
            font-size: 15px;
            font-weight: 700;
        }

        .about-video-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
        }

        .about-video-card {
            min-width: 0;
        }

        .about-video-card h3 {
            font-size: 15px;
            line-height: 1.35;
            margin: 0 0 10px;
            color: #202124;
            min-height: 42px;
        }

        .about-video-thumb {
            position: relative;
            display: block;
            width: 100%;
            padding: 0;
            border: 0;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            background: #111;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: box-shadow 180ms ease, transform 180ms ease;
        }

        .about-video-thumb img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-video-thumb::after {
            content: "play_arrow";
            font-family: "Material Icons";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 54px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.72);
            color: #ffffff;
            font-size: 32px;
            transform: translate(-50%, -50%);
        }

        .about-video-thumb:hover,
        .about-video-thumb:focus-visible,
        .about-video-thumb.is-active {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(33, 33, 33, 0.18), 0 0 0 3px rgba(169, 130, 18, 0.3);
            outline: none;
        }

        .about-video-cta {
            margin-top: 12px;
        }

        .about-video-cta .btn {
            width: 100%;
            min-height: 38px;
            font-size: 13px;
            font-weight: 700;
        }

        .about-news-section .news-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        @media (max-width: 1100px) {
            .about-video-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 700px) {
            .about-section {
                padding: 16px;
            }

            .about-section__header {
                align-items: flex-start;
                flex-direction: column;
            }

            .about-video-grid,
            .about-news-section .news-grid {
                grid-template-columns: 1fr;
            }

            .about-video-card h3 {
                min-height: 0;
            }
        }
    </style>

    <div class="container">
        <div class="news-header">
            <h1 class="news-title" data-i18n="aboutPage.title">About</h1>
            <p class="news-subtitle" data-i18n="aboutPage.subtitle">Videos, news, and articles from NALA</p>
        </div>

        <section class="about-section" aria-labelledby="aboutVideosTitle">
            <div class="about-section__header">
                <div>
                    <h2 class="about-section__title" id="aboutVideosTitle" data-i18n="aboutPage.videos.title">Videos</h2>
                    <p class="about-section__subtitle" data-i18n="aboutPage.videos.subtitle">Watch the latest program videos.</p>
                </div>
            </div>

            <div class="about-featured-video" aria-live="polite">
                <div class="about-featured-video__frame">
                    <iframe id="aboutFeaturedVideo"
                        src="https://player.vimeo.com/video/1106503990?title=0&amp;byline=0&amp;portrait=0&amp;badge=0&amp;autopause=0&amp;fullscreen=1&amp;player_id=about-featured-video&amp;app_id=58479"
                        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                        allowfullscreen
                        referrerpolicy="strict-origin-when-cross-origin"
                        title="Master Safe Lockout Skills"></iframe>
                </div>
                <p class="about-featured-video__caption" id="aboutFeaturedVideoTitle" data-i18n="aboutPage.video.safe">Master Safe Lockout Skills</p>
            </div>

            <div class="about-video-grid">
                <article class="about-video-card">
                    <h3 data-i18n="aboutPage.video.safe">Master Safe Lockout Skills</h3>
                    <button type="button" class="about-video-thumb is-active" data-video-id="1106503990" aria-label="Play Master Safe Lockout Skills">
                        <img src="img/about-videos/safe.png" alt="Master Safe Lockout Skills video preview" loading="lazy">
                    </button>
                </article>

                <article class="about-video-card">
                    <h3 data-i18n="aboutPage.video.career">Build Your Locksmith Career Online</h3>
                    <button type="button" class="about-video-thumb" data-video-id="1106503753" aria-label="Play Build Your Locksmith Career Online">
                        <img src="img/about-videos/career.png" alt="Build Your Locksmith Career Online video preview" loading="lazy">
                    </button>
                </article>

                <article class="about-video-card">
                    <h3 data-i18n="aboutPage.video.pace">Learn at Your Own Pace</h3>
                    <button type="button" class="about-video-thumb" data-video-id="1106503424" aria-label="Play Learn at Your Own Pace">
                        <img src="img/about-videos/pace.png" alt="Learn at Your Own Pace video preview" loading="lazy">
                    </button>
                </article>

                <article class="about-video-card">
                    <h3 data-i18n="aboutPage.video.work">Train for Real Locksmith Work</h3>
                    <button type="button" class="about-video-thumb" data-video-id="1106503213" aria-label="Play Train for Real Locksmith Work">
                        <img src="img/about-videos/work.png" alt="Train for Real Locksmith Work video preview" loading="lazy">
                    </button>
                </article>
            </div>
        </section>

        <section class="about-section about-news-section" aria-labelledby="aboutArticlesTitle">
            <div class="about-section__header">
                <div>
                    <h2 class="about-section__title" id="aboutArticlesTitle" data-i18n="aboutPage.articles.title">News &amp; Articles</h2>
                    <p class="about-section__subtitle" data-i18n="aboutPage.articles.subtitle">Browse recent updates and industry notes.</p>
                </div>
            </div>

            <div class="news-grid" id="newsGrid"></div>
        </section>
    </div>
</div>

<script src="news/news.config.js"></script>
<script src="news/news.js"></script>
<script>
    (function () {
        function initAboutVideoGallery() {
            var iframe = document.getElementById("aboutFeaturedVideo");
            var caption = document.getElementById("aboutFeaturedVideoTitle");
            var thumbs = Array.prototype.slice.call(document.querySelectorAll(".about-video-thumb"));
            if (!iframe || !caption || !thumbs.length) return;

            thumbs.forEach(function (thumb) {
                thumb.addEventListener("click", function () {
                    var videoId = thumb.getAttribute("data-video-id");
                    var title = "";
                    var card = thumb.closest(".about-video-card");
                    var heading = card ? card.querySelector("h3") : null;
                    if (heading) title = heading.textContent.trim();
                    if (!videoId) return;

                    thumbs.forEach(function (item) {
                        item.classList.toggle("is-active", item === thumb);
                    });

                    iframe.src = "https://player.vimeo.com/video/" + encodeURIComponent(videoId) + "?title=0&byline=0&portrait=0&badge=0&autopause=0&autoplay=1&fullscreen=1&player_id=about-featured-video&app_id=58479";
                    iframe.title = title || "NALA video";
                    caption.textContent = title || "";
                });
            });
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initAboutVideoGallery);
        } else {
            initAboutVideoGallery();
        }
    }());
</script>
