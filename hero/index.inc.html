<link href="hero/hero.css" rel="stylesheet">

<div id="MTK-hero">
    <div class="container">
	<div class="row align-items-center MTK-hero-row">
	    <div class="MTK-hero-lhs col-md-5">
		<div class="MTK-hero-card">
		    <h1 class="MTK-hero-title"></h1>
		    <p class="MTK-hero-description"></p>

		    <div class="MTK-hero-actions mt-5">
			<button type="button" class="btn nala-btn-primary mtk-ripple btn-lg" data-i18n="hero.cta" onclick="if (typeof nalaShowRegister === 'function') { nalaShowRegister(); } else if (wc.pages && typeof wc.pages.show === 'function') { wc.pages.show('register'); } else { wc.publish('mtk-ready:click'); } return false;">Get Started</button>
			<button type="button" class="btn nala-btn-outline-primary mtk-ripple btn-lg MTK-hero-watch-cta" data-i18n="hero.watchVideos" onclick="if (wc.pages && typeof wc.pages.show === 'function') { wc.pages.show('news'); } else { window.location.hash = 'news'; } return false;">Watch Videos</button>
		    </div>
		</div>

	    </div>
	    <div class="MTK-hero-rhs col-md-7 text-center">
		<img class="MTK-hero-img img-fluid" src="" alt="Hero Image">
	    </div>
	</div>
    </div>
</div>

<script src="hero/hero.config.js"></script>
<script src="hero/hero.js"></script>
