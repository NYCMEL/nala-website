<link href="contact/mtk-contact.css" rel="stylesheet">

<mtk-contact class="mtk-contact" role="region" aria-label="Contact NALA">
    <section class="mtk-contact__shell">
        <div class="mtk-contact__intro">
            <p class="mtk-contact__eyebrow" data-i18n="nav.contact">Contact</p>
            <h1 class="mtk-contact__title">Contact us.</h1>
        </div>

        <form class="mtk-contact__form" novalidate>
            <p class="mtk-contact__required-note">Fields marked with an asterisk (*) are required.</p>
            <div class="mtk-contact__profile-note" data-profile-note hidden></div>

            <label class="mtk-contact__field mtk-contact__field--full">
                <span>Subject <strong aria-hidden="true">*</strong></span>
                <input name="subject" type="text" required>
            </label>

            <label class="mtk-contact__field mtk-contact__field--full">
                <span>Message <strong aria-hidden="true">*</strong></span>
                <div class="mtk-contact__editor" data-contact-editor>
                    <div class="mtk-contact__toolbar" aria-label="Message formatting">
                        <button type="button" data-format-command="bold" aria-label="Bold"><strong>B</strong></button>
                        <button type="button" data-format-command="italic" aria-label="Italic"><em>I</em></button>
                        <button type="button" data-format-command="insertUnorderedList" aria-label="Bulleted list"><span class="material-icons" aria-hidden="true">format_list_bulleted</span></button>
                        <button type="button" data-format-command="createLink" aria-label="Add link"><span class="material-icons" aria-hidden="true">link</span></button>
                        <label class="mtk-contact__image-button" aria-label="Add image">
                            <span class="material-icons" aria-hidden="true">image</span>
                            <input type="file" accept="image/*" data-image-input multiple>
                        </label>
                    </div>
                    <div class="mtk-contact__message" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Message" data-message-editor></div>
                </div>
                <textarea name="message" rows="6" hidden></textarea>
                <input name="messageHtml" type="hidden">
                <div class="mtk-contact__attachments" data-attachments></div>
            </label>

            <div class="mtk-contact__actions">
                <button class="mtk-contact__submit" type="submit">
                    <span class="material-icons" aria-hidden="true">send</span>
                    Send message
                </button>
                <p class="mtk-contact__status" aria-live="polite"></p>
            </div>
        </form>
    </section>
</mtk-contact>

<script src="contact/mtk-contact.js"></script>
