<link href="contact/mtk-contact.css" rel="stylesheet">

<mtk-contact class="mtk-contact" role="region" aria-label="Contact NALA">
    <section class="mtk-contact__shell">
        <div class="mtk-contact__intro">
            <p class="mtk-contact__eyebrow" data-i18n="nav.contact">Contact</p>
            <h1 class="mtk-contact__title">How can we help?</h1>
            <p class="mtk-contact__copy">
                Send us the details and choose the issue type that best matches what you need.
            </p>
        </div>

        <form class="mtk-contact__form" novalidate>
            <p class="mtk-contact__required-note">Fields marked with an asterisk (*) are required.</p>

            <label class="mtk-contact__field">
                <span>Name <strong aria-hidden="true">*</strong></span>
                <input name="name" type="text" autocomplete="name" required>
            </label>

            <label class="mtk-contact__field">
                <span>Email <strong aria-hidden="true">*</strong></span>
                <input name="email" type="email" autocomplete="email" required>
            </label>

            <label class="mtk-contact__field">
                <span>Phone</span>
                <input name="phone" type="tel" autocomplete="tel">
            </label>

            <label class="mtk-contact__field">
                <span>Issue <strong aria-hidden="true">*</strong></span>
                <select name="issue" required>
                    <option value="">Choose an issue</option>
                    <option value="account_login">Account login</option>
                    <option value="payment_issue">Payment issue</option>
                    <option value="course_access">Course access</option>
                    <option value="business_in_a_box">Business in a Box</option>
                    <option value="website_seo">Website or SEO</option>
                    <option value="shipping_kit">Shipping or kit</option>
                    <option value="technical_problem">Technical problem</option>
                    <option value="other">Other</option>
                </select>
            </label>

            <label class="mtk-contact__field mtk-contact__field--full">
                <span>Message <strong aria-hidden="true">*</strong></span>
                <textarea name="message" rows="6" required></textarea>
            </label>

            <div class="mtk-contact__actions">
                <button class="mtk-contact__submit" type="submit">
                    <span class="material-icons" aria-hidden="true">send</span>
                    Send message
                </button>
                <p class="mtk-contact__status" aria-live="polite"></p>
            </div>
        </form>
    </section>
</mtk-contact>

<script src="contact/mtk-contact.js"></script>
