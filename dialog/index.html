<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<title>MTK Dialog</title>

	<!-- Bootstrap Layout Only -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Material Icons -->
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

	<!-- Compiled CSS -->
	<link rel="stylesheet" href="mtk-dialog.css">
    </head>
    <body class="p-5">

	<!-- Simulating wc-include -->
	<mtk-dialog class="mtk-dialog"></mtk-dialog>

	<button class="btn btn-primary"
		onclick="wc.publish('dialog.open')">
            Open Dialog
	</button>

	<script src="mtk-dialog.js"></script>

    </body>
</html>
