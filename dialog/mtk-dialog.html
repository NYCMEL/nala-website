<link href="dialog/mtk-dialog.css" rel="stylesheet">

<mtk-dialog class="mtk-dialog" role="dialog" aria-modal="true">
    <div class="dialog-backdrop"></div>

    <div class="dialog-container container-fluid" tabindex="-1">
	<div class="dialog-header row">
	    <div class="col">
		<h2 class="dialog-title"></h2>
	    </div>
	</div>

	<div class="dialog-body row">
	    <div class="col dialog-message"></div>
	</div>

	<div class="dialog-footer row">
	    <div class="col d-flex justify-content-end gap-2 dialog-buttons"></div>
	</div>
    </div>
</mtk-dialog>

<script src="dialog/mtk-dialog.config.js"></script>
<script src="dialog/mtk-dialog.js"></script>
