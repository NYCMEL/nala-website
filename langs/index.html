<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8">
	<title>CSV Language Demo</title>
    </head>

    <body>
	<h1 data-i18n="title"></h1>
	<p data-i18n="subtitle"></p>
	
	<button onclick="setLanguage('en')">English</button>
	<button onclick="setLanguage('es')">Español</button>
	<button onclick="setLanguage('ch')">Chinese</button>
	<button onclick="setLanguage('he')">Hebrew</button>

	<script src="../js/_wc.js"></script>

	<script>
	 function setLanguage(lang, csvfile) {
	     loadLangsCSV(lang, csvfile);
	 }

	 setLanguage("en","nala.lang.csv");
	</script>
    </body>
</html>
