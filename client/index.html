<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8">
	<title>Client</title>

	<base href="/repo_deploy/">

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- W3C LOGGING -->
	<script>
	 wcENV="dev"; // prod || dev
	 wcAPP="app";
	 wcURL="";
	</script>

	<!-- BOOTSTRAP & MATERIAL DESIGN -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://unpkg.com/material-clients-web@latest/dist/material-clients-web.min.css">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

	<!-- SOCIAL ICONS -->
	<link href="css/fonts/fonts.css" rel="stylesheet">

	<!-- APPLICATION STYLES -->
	<link href="css/nala.css" rel="stylesheet">
    </head>

    <body id="wc">
	<!-- BOOTSTRAP & JQUERY -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://unpkg.com/material-clients-web@latest/dist/material-clients-web.min.js"></script>
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>

	<!-- COMMON STUFF -->
	<script src="js/_wc.js"></script>
	<script src="js/app.js"></script>
	<script src="buy/wc-purchase-flow.js"></script>
	<script src="js/_febe.js" defer></script>
	
	<!-- YOUR CODE FROM HERE... -->

	<link href="client/css/client.css" rel="stylesheet">

	<!-- CLIENT -->
	<script src="client/js/client.js"></script>

	<div id="client-access-root">
	    <wc-include href="client/client.html"/>
	</div>

	<script>
	    (function() {
		function t(key, fallback) {
		    if (!window.i18n || typeof window.i18n.t !== 'function') return fallback;
		    var value = window.i18n.t(key);
		    return value === key ? fallback : value;
		}

		var uid = new URLSearchParams(window.location.search).get('nalaUID');
		if (uid) return;

		function renderLockedState(mode) {
		    var root = document.getElementById('client-access-root');
		    if (!root) return;

		    var title = mode === 'premium' ? t('client.locked.title', 'Business in a Box') : t('client.locked.accessTitle', 'Business in a Box Access');
		    var message = mode === 'premium'
			? t('dashboard.option.business.purchaseOnly', 'To purchase Business in a Box services, click here.')
			: t('dashboard.option.business.purchaseWithPremium', 'To gain access to the full course and Business in a Box services, click here.');
		    var buttons = mode === 'premium'
			? '<button type="button" class="btn btn-primary" data-purchase-plan="business">' + t('dashboard.option.business.buttonOnly', 'Purchase Business in a Box') + '</button>'
			: '<div style="display:flex;gap:12px;flex-wrap:wrap">'
			    + '<button type="button" class="btn btn-outline-primary" data-purchase-plan="premium">' + t('dashboard.option.premium.button', 'Purchase Premium') + '</button>'
			    + '<button type="button" class="btn btn-primary" data-purchase-plan="business">' + t('dashboard.option.business.buttonBundle', 'Purchase Premium + Business in a Box') + '</button>'
			    + '</div>';

		    root.innerHTML = ''
			+ '<div class="container" style="max-width:900px;margin:120px auto 48px;padding:0 16px">'
			+ '  <div style="background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:32px;box-shadow:0 2px 6px rgba(0,0,0,0.08)">'
			+ '    <div style="width:56px;height:56px;border-radius:50%;background:#a98212;color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:18px">'
			+ '      <span class="material-icons">storefront</span>'
			+ '    </div>'
			+ '    <h1 style="margin:0 0 14px 0;font-size:32px;color:#212121">' + title + '</h1>'
			+ '    <p style="margin:0 0 22px 0;font-size:18px;color:#424242">' + message + '</p>'
			+      buttons
			+ '  </div>'
			+ '</div>';

		    root.querySelectorAll('[data-purchase-plan]').forEach(function(btn) {
			btn.addEventListener('click', function() {
			    if (window.wc && wc.buy && typeof wc.buy.handlePurchasePlan === 'function') {
				wc.buy.handlePurchasePlan(btn.getAttribute('data-purchase-plan'));
			    }
			});
		    });

		    if (window.wc && wc.buy && typeof wc.buy.syncPurchaseButtons === 'function') {
			wc.buy.syncPurchaseButtons();
		    }
		}

		wc.getSession(function(loggedIn, session) {
		    var user = session && session.user ? session.user : {};
		    var hasBusiness = Number(user.has_business_in_a_box || 0) === 1;
		    var hasPremium = Number(user.has_premium || 0) === 1;
		    if (hasBusiness) return;
		    renderLockedState(hasPremium ? 'premium' : 'registered');
		});
	    })();

	    (function() {
		function loadScript(src, onload, onerror) {
		    var s = document.createElement('script');
		    s.src = src;
		    if (typeof onload === 'function') s.onload = onload;
		    if (typeof onerror === 'function') s.onerror = onerror;
		    document.body.appendChild(s);
		}

		function bootProfile(profile) {
		    if (!profile || typeof window.client !== 'function') {
			return;
		    }

		    window.config = profile;
		    window.client(profile);
		}

		function loadDefaultConfig() {
		    loadScript('client/js/client.config.js', function() {
			if (typeof window.config !== 'undefined' && typeof window.client === 'function') {
			    window.client(window.config);
			}
		    }, function() {
			console.warn('[client] Failed to load fallback client.config.js');
		    });
		}

		var uid = new URLSearchParams(window.location.search).get('nalaUID');
		if (uid) return;

		wc.getSession(function(loggedIn, session) {
		    var user = session && session.user ? session.user : {};
		    var hasBusiness = Number(user.has_business_in_a_box || 0) === 1;
		    if (!hasBusiness) return;

		    fetch(wc.apiURL + '/api/business_in_a_box_profile.php', {
			credentials: 'include'
		    }).then(function(res) {
			return res.json().then(function(json) {
			    if (!res.ok) {
				throw new Error((json && (json.error || json.message)) || t('client.profile.loadError', 'Could not load Business in a Box profile.'));
			    }
			    return json;
			});
		    }).then(function(json) {
			if (json && json.profile) {
			    bootProfile(json.profile);
			    return;
			}

			loadDefaultConfig();
		    }).catch(function(err) {
			console.warn('[client] Failed to load saved Business in a Box profile', err);
			loadDefaultConfig();
		    });
		});
	    })();

	    // After client.js is defined, load /websites/{nalaUID}.js if param present
	    // Must run AFTER wc-include fires so DOM exists, but client.js already defines window.client
	    (function() {
		var uid = new URLSearchParams(window.location.search).get('nalaUID');
		if (!uid || !/^[a-zA-Z0-9_-]+$/.test(uid)) return;
		console.log('[client] nalaUID=' + uid + ' — loading /websites/' + uid + '.js');
		var s = document.createElement('script');
		s.src = 'websites/' + uid + '.js';
		s.onerror = function() {
		    console.warn('[client] /websites/' + uid + '.js not found — no config loaded');
		};
		document.body.appendChild(s);
	    })();
	</script>
    </body>
</html>
