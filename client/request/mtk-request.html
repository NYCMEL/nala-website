<mtk-request class="mtk-request">

    <!-- Trigger Button -->
    <button type="button" class="btn btn-primary open-dialog">
	Request Estimate
    </button>

    <!-- Modal -->
    <div class="modal fade" tabindex="-1">
	<div class="modal-dialog modal-lg modal-dialog-centered">
	    <div class="modal-content">

		<div class="modal-header">
		    <h5 class="modal-title"></h5>
		    <button type="button" class="btn-close close-dialog"></button>
		</div>

		<div class="modal-body">
		    <form>

			<div class="mb-3">
			    <label></label>
			    <input type="text" class="form-control name" required />
			</div>

			<div class="mb-3">
			    <label></label>
			    <input type="email" class="form-control email" required />
			</div>

			<div class="mb-3">
			    <label></label>
			    <input type="tel" class="form-control phone" />
			</div>

			<div class="mb-3">
			    <label></label>
			    <input type="text" class="form-control address" />
			</div>

			<div class="mb-3">
			    <label></label>
			    <textarea class="form-control help" rows="3"></textarea>
			</div>

			<div class="mb-3">
			    <label>Preferred Contact Method</label>
			    <select class="form-select contact-type"></select>
			</div>

			<div class="mb-3 phone-times">
			    <label>Best Time to Call</label>
			    <select class="form-select call-time"></select>
			</div>

			<button type="submit" class="btn btn-primary w-100 submit-btn">
			</button>

		    </form>
		</div>

	    </div>
	</div>
    </div>

</mtk-request>
