<link href="client/request/mtk-request.css" rel="stylesheet">

<mtk-request class="mtk-request">

    <button type="button" class="btn btn-primary open-dialog">
	Request Estimate
    </button>

    <div class="modal fade" tabindex="-1">
	<div class="modal-dialog modal-dialog-centered">
	    <div class="modal-content">

		<div class="modal-header">
		    <h5 class="modal-title"></h5>
		    <button type="button" class="btn-close close-dialog"></button>
		</div>

		<div class="modal-body">
		    <form>

			<div class="md-field">
			    <input type="text" class="name" required />
			    <label></label>
			</div>

			<div class="md-field">
			    <input type="email" class="email" required />
			    <label></label>
			</div>

			<div class="md-field">
			    <input type="tel" class="phone" />
			    <label></label>
			</div>

			<div class="md-field">
			    <input type="text" class="address" />
			    <label></label>
			</div>

			<div class="md-field">
			    <textarea class="help" rows="3"></textarea>
			    <label></label>
			</div>

			<div class="md-field contact-group">
			    <label class="group-label">Preferred Contact Method</label>
			    <div class="radio-group"></div>
			</div>

			<div class="md-field phone-times">
			    <select class="call-time"></select>
			    <label>Best Time to Call</label>
			</div>

			<!-- FIXED BUTTON -->
			<div class="submit-wrap">
			    <button type="submit" class="btn btn-primary submit-btn"></button>
			</div>

		    </form>
		</div>

	    </div>
	</div>
    </div>

</mtk-request>

<script src="client/request/mtk-request.config.js"></script>
<script src="client/request/mtk-request.js"></script>
