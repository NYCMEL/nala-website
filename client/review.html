<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leave a Review</title>
    <base href="/repo_deploy/">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="css/nala.css" rel="stylesheet">
    <link href="client/css/client.css" rel="stylesheet">
    <script>
     wcENV="dev";
     wcAPP="app";
     wcURL="";
    </script>
    <script src="js/_wc.js"></script>
</head>
<body class="client-review-page">
    <main class="client-review-form">
        <div class="client-review-form__brand">
            <span class="material-icons">rate_review</span>
            <h1>Leave a Review</h1>
            <p>Your rating helps future customers understand the business. The business owner cannot remove ratings from the average.</p>
        </div>

        <form id="publicReviewForm">
            <label>
                Your name
                <input type="text" name="customerName" required>
            </label>

            <fieldset>
                <legend>Your rating</legend>
                <div class="client-review-form__stars" role="radiogroup" aria-label="Rating">
                    <label><input type="radio" name="rating" value="1" required><span>★</span></label>
                    <label><input type="radio" name="rating" value="2"><span>★</span></label>
                    <label><input type="radio" name="rating" value="3"><span>★</span></label>
                    <label><input type="radio" name="rating" value="4"><span>★</span></label>
                    <label><input type="radio" name="rating" value="5"><span>★</span></label>
                </div>
            </fieldset>

            <label>
                Review
                <textarea name="text" rows="5" required placeholder="Tell the business what went well and what could improve."></textarea>
            </label>

            <button type="submit" class="btn btn-primary">Submit Review</button>
            <p id="reviewSubmitStatus" aria-live="polite"></p>
        </form>
    </main>

    <script src="client/js/review.js"></script>
</body>
</html>
