<div class="client-container">
    <div class="client-layout">
	<!-- Main Content -->
	<main class="client-main">
	    <!-- Header Section -->
	    <header class="client-header">
		<div class="client-logo" id="clientLogo"></div>
		<div class="client-info">
		    <h1 class="client-name" id="clientName"></h1>
		    <div class="client-rating" id="clientRating"></div>
		    <div class="client-badges" id="clientBadges"></div>
		    <button class="btn-share" id="btnShare">
			<span class="material-icons">share</span>
			Share
		    </button>
		</div>
	    </header>

	    <!-- Stats Section -->
	    <section class="client-stats" id="clientStats"></section>

	    <!-- Tabs Navigation -->
	    <nav class="client-tabs" id="clientTabs"></nav>

	    <!-- Tab Content -->
	    <div class="client-content">
		<!-- About Section -->
		<section class="content-section" id="aboutSection">
		    <h2>About</h2>
		    <p class="about-text" id="aboutText"></p>
		</section>

		<!-- Business Hours -->
		<section class="content-section">
		    <h2 id="businessHoursTitle"></h2>
		    <p id="businessHoursText"></p>
		</section>

		<!-- Payment Methods -->
		<section class="content-section">
		    <h2 id="paymentMethodsTitle"></h2>
		    <p id="paymentMethodsText"></p>
		</section>

		<!-- Social Media -->
		<section class="content-section">
		    <h2 id="socialMediaTitle"></h2>
		    <div id="socialMediaLinks"></div>
		</section>

		<!-- Top Pro Status -->
		<section class="content-section">
		    <h2 id="topProTitle"></h2>
		    <p id="topProDescription"></p>
		    <div class="top-pro-badges" id="topProBadges"></div>
		</section>
	    </div>
	</main>

	<!-- Sidebar -->
	<aside class="client-sidebar">
	    <!-- Contact Card -->
	    <div class="card contact-card">
		<div class="contact-header">
		    <span class="material-icons">chat_bubble_outline</span>
		    <span id="contactPrice"></span>
		</div>
		<a href="#" class="link-details" id="viewDetailsLink"></a>
		<button class="btn-primary btn-estimate" id="btnEstimate"></button>
		<div class="online-status" id="onlineStatus">
		    <span class="status-dot"></span>
		    <span>Online now</span>
		</div>
	    </div>

	    <!-- Guarantee Card -->
	    <div class="card guarantee-card">
		<div class="guarantee-icon">
		    <span class="material-icons">verified_user</span>
		</div>
		<h3 id="guaranteeTitle"></h3>
		<p id="guaranteeText"></p>
		<a href="#" class="link-learn-more" id="learnMoreLink"></a>
	    </div>
	</aside>
    </div>
</div>

<!-- REQUEST DIALOG — inlined to avoid nested wc-include timing issues -->
<link href="client/mtk-request.css" rel="stylesheet">

<mtk-request class="mtk-request">

    <!-- Trigger button hidden — opened via wc.publish("mtk-request:open") -->
    <button type="button" class="btn btn-primary open-dialog" style="display:none" aria-hidden="true">
	Request Estimate
    </button>

    <div class="modal fade" tabindex="-1">
	<div class="modal-dialog modal-dialog-centered">
	    <div class="modal-content">

		<div class="modal-header">
		    <h5 class="modal-title"></h5>
		    <button type="button" class="btn-close close-dialog"></button>
		</div>

		<div class="modal-body">
		    <form>

			<div class="md-field">
			    <input type="text" class="name" required />
			    <label></label>
			</div>

			<div class="md-field">
			    <input type="email" class="email" />
			    <label></label>
			</div>

			<div class="md-field">
			    <input type="tel" class="phone" />
			    <label></label>
			</div>

			<div class="md-field">
			    <input type="text" class="address" />
			    <label></label>
			</div>

			<div class="md-field">
			    <textarea class="help" rows="3"></textarea>
			    <label></label>
			</div>

			<!-- RADIO GROUP -->
			<div class="contact-group">
			    <div class="group-label">Preferred Contact Method</div>
			    <div class="radio-group"></div>
			</div>

			<div class="md-field phone-times">
			    <select class="call-time"></select>
			    <label>Best Time to Call</label>
			</div>

			<input type="hidden" class="nala-uid" name="nalaUID" value="" />

			<div class="submit-wrap">
			    <button type="submit" class="btn btn-primary submit-btn"></button>
			</div>

		    </form>
		</div>

	    </div>
	</div>
    </div>

</mtk-request>

<script src="client/mtk-request.config.js"></script>
<script src="client/mtk-request.js"></script>
