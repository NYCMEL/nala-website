<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NALA - Set Password</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #1f6fc5;
      --primary-hover: #195ea8;
      --error: #c62828;
      --ok: #2e7d32;
      --border: #d1d5db;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 14px;
      margin: 12px 0 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 16px;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }
    button:hover {
      background: var(--primary-hover);
    }
    .msg {
      margin-top: 12px;
      font-size: 14px;
      min-height: 20px;
    }
    .msg.error { color: var(--error); }
    .msg.ok { color: var(--ok); }
    .footer-link {
      margin-top: 14px;
      display: inline-block;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set Password</h1>
    <p>Create your password to activate your NALA account.</p>

    <form id="set-password-form" novalidate>
      <label for="password">New password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required />

      <label for="password2">Repeat password</label>
      <input id="password2" type="password" autocomplete="new-password" minlength="8" required />

      <button type="submit">Set Password</button>
      <div id="msg" class="msg" aria-live="polite"></div>
    </form>

    <a class="footer-link" href="../index.html">Back to website</a>
  </div>

  <script>
    (function () {
      const form = document.getElementById('set-password-form');
      const msg = document.getElementById('msg');
      const pw = document.getElementById('password');
      const pw2 = document.getElementById('password2');
      const token = new URLSearchParams(window.location.search).get('token') || '';

      function showError(text) {
        msg.className = 'msg error';
        msg.textContent = text;
      }

      function showOk(text) {
        msg.className = 'msg ok';
        msg.textContent = text;
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.className = 'msg';
        msg.textContent = '';

        if (!token) {
          showError('Invalid setup link.');
          return;
        }

        const password = pw.value || '';
        const password2 = pw2.value || '';

        if (password.length < 8) {
          showError('Password must be at least 8 characters.');
          pw.focus();
          return;
        }

        if (password !== password2) {
          showError('Passwords do not match.');
          pw2.focus();
          return;
        }

        try {
          const res = await fetch('../../api/set_password.php', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password, password2 })
          });

          const data = await res.json().catch(function () { return {}; });
          if (!res.ok || !data.ok) {
            showError(data.error || 'Could not set password.');
            return;
          }

          showOk('Password set successfully. You can now log in.');
          setTimeout(function () {
            window.location.href = '../index.html';
          }, 1500);
        } catch (err) {
          showError('Network error. Please try again.');
        }
      });
    })();
  </script>
</body>
</html>
