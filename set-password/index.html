<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NALA - Set Password</title>
  <link rel="stylesheet" href="mtk-set-password.css" />
</head>
<body>
  <main id="set-password-root">
    <div id="set-password-include"></div>
  </main>

  <script>
    (function () {
      var mount = document.getElementById("set-password-include");
      if (!mount) return;

      fetch("index.inc.html")
        .then(function (res) { return res.text(); })
        .then(function (html) {
          mount.innerHTML = html;
          var event = new CustomEvent("set-password:mounted");
          document.dispatchEvent(event);
        });
    })();
  </script>
  <script src="mtk-set-password.js"></script>
</body>
</html>
