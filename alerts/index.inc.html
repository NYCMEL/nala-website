<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK-Alerts</title>

  <!-- Material Icons -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/icon?family=Material+Icons" />

  <!-- Roboto -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" />

  <!--
    NOTE: In a real build pipeline, compile mtk-alerts.scss → mtk-alerts.css
    and reference it here. For development you can use a live SCSS compiler or
    a CDN-based transpiler such as sass.js.
    <link rel="stylesheet" href="mtk-alerts.css" />
  -->

  <style>
    /* Minimal host page reset */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin:     0;
      padding:    0;
      min-height: 100%;
      background: #f4f6fb;
    }

    body {
      font-family: 'Roboto', sans-serif;
    }
  </style>
</head>
<body>

  <!-- MTK-ALERTS component markup -->
  <!-- In production this would be injected via <wc-include src="mtk-alerts.html"> -->

  <mtk-alerts class="mtk-alerts" role="region" aria-label="Alerts">
    <div class="mtk-shell">

      <header class="mtk-header">
        <div class="mtk-header__left">
          <span class="material-icons mtk-header__icon" aria-hidden="true">notifications</span>
          <h1 class="mtk-header__title">Alerts</h1>
          <span class="mtk-badge" id="mtk-unread-count" aria-label="unread alerts" role="status">0</span>
        </div>
      </header>

      <!-- List View -->
      <div class="mtk-list-view" id="mtk-list-view">

        <div class="mtk-tabs" role="tablist" aria-label="Alert categories">
          <button class="mtk-tab" role="tab" id="tab-unread"   aria-controls="panel-unread"   aria-selected="true"  tabindex="0"  data-tab="unread">
            <span class="material-icons" aria-hidden="true">mark_email_unread</span>Unread
          </button>
          <button class="mtk-tab" role="tab" id="tab-archived" aria-controls="panel-archived" aria-selected="false" tabindex="-1" data-tab="archived">
            <span class="material-icons" aria-hidden="true">inventory_2</span>Archived
          </button>
        </div>

        <div class="mtk-panel" id="panel-unread" role="tabpanel" aria-labelledby="tab-unread" aria-hidden="false">
          <ul class="mtk-list" id="mtk-unread-list" aria-label="Unread alerts" aria-live="polite"></ul>
          <div class="mtk-empty" id="mtk-empty-unread" hidden aria-live="polite">
            <span class="material-icons" aria-hidden="true">done_all</span>
            <p>No unread alerts — you're all caught up!</p>
          </div>
        </div>

        <div class="mtk-panel" id="panel-archived" role="tabpanel" aria-labelledby="tab-archived" aria-hidden="true">
          <ul class="mtk-list" id="mtk-archived-list" aria-label="Archived alerts" aria-live="polite"></ul>
          <div class="mtk-empty" id="mtk-empty-archived" hidden aria-live="polite">
            <span class="material-icons" aria-hidden="true">inventory_2</span>
            <p>Nothing archived yet.</p>
          </div>
        </div>

      </div><!-- /mtk-list-view -->

      <!-- Detail View -->
      <div class="mtk-detail" id="mtk-detail-view" aria-hidden="true" role="article" aria-label="Alert detail">

        <button class="mtk-detail__back" id="mtk-btn-back" aria-label="Back to alerts list">
          <span class="material-icons" aria-hidden="true">arrow_back</span>
          Back
        </button>

        <div class="mtk-detail__card" id="mtk-detail-card" data-type="">
          <div class="mtk-detail__header">
            <div class="mtk-detail__icon">
              <span class="material-icons" id="mtk-detail-icon" aria-hidden="true">info</span>
            </div>
            <div class="mtk-detail__meta">
              <span class="mtk-detail__type-chip" id="mtk-detail-type">Info</span>
              <h2 class="mtk-detail__title" id="mtk-detail-title"></h2>
              <time class="mtk-detail__time" id="mtk-detail-time" datetime=""></time>
            </div>
          </div>
          <div class="mtk-detail__body">
            <p class="mtk-detail__message" id="mtk-detail-message"></p>
          </div>
          <div class="mtk-detail__actions" id="mtk-detail-actions"></div>
        </div>

      </div><!-- /mtk-detail-view -->

    </div><!-- /mtk-shell -->
  </mtk-alerts>

  <!-- Config must load first -->
  <script src="mtk-alerts.config.js"></script>
  <!-- Component logic -->
  <script src="mtk-alerts.js"></script>

</body>
</html>
