<link href="alerts/mtk-alerts.css" rel="stylesheet">

<!-- MTK-ALERTS Component -->
<mtk-alerts class="mtk-alerts" role="region" aria-label="Alerts">

  <div class="mtka-header">
    <span class="material-icons mtka-header-icon" aria-hidden="true">notifications</span>
    <h2 class="mtka-header-title">Alerts</h2>
    <span class="mtka-badge" id="mtk-alerts-unread-count" role="status" aria-label="unread alerts" hidden>0</span>
  </div>

  <!-- Segmented Switch -->
  <div class="mtka-switch" role="tablist" aria-label="Alert view">
    <button class="mtka-switch-btn mtka-switch-btn--active" role="tab"
            id="tab-unread" aria-controls="panel-unread"
            aria-selected="true" tabindex="0" data-tab="unread">
      <span class="material-icons" aria-hidden="true">mark_email_unread</span>
      Unread
    </button>
    <button class="mtka-switch-btn" role="tab"
            id="tab-archived" aria-controls="panel-archived"
            aria-selected="false" tabindex="-1" data-tab="archived">
      <span class="material-icons" aria-hidden="true">inventory_2</span>
      Archived
    </button>
  </div>

  <!-- Panel: Unread -->
  <div class="mtka-panel" id="panel-unread"
       role="tabpanel" aria-labelledby="tab-unread" aria-hidden="false">
    <div class="mtka-table-wrap" id="mtk-unread-wrap">
      <table class="mtka-table" aria-label="Unread alerts">
        <colgroup>
          <col class="col-icon" />
          <col class="col-date" />
          <col class="col-message" />
          <col class="col-actions" />
        </colgroup>
        <thead>
          <tr>
            <th scope="col" class="col-icon" aria-label="Type"></th>
            <th scope="col" class="col-date">Date</th>
            <th scope="col" class="col-message">Message</th>
            <th scope="col" class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="mtk-unread-tbody" aria-live="polite"></tbody>
      </table>
    </div>
    <div class="mtka-empty" id="mtk-empty-unread" hidden aria-live="polite">
      <span class="material-icons" aria-hidden="true">done_all</span>
      <p>No unread alerts</p>
    </div>
  </div>

  <!-- Panel: Archived -->
  <div class="mtka-panel" id="panel-archived"
       role="tabpanel" aria-labelledby="tab-archived" aria-hidden="true">
    <div class="mtka-table-wrap" id="mtk-archived-wrap">
      <table class="mtka-table" aria-label="Archived alerts">
        <colgroup>
          <col class="col-icon" />
          <col class="col-date" />
          <col class="col-message" />
          <col class="col-actions" />
        </colgroup>
        <thead>
          <tr>
            <th scope="col" class="col-icon" aria-label="Type"></th>
            <th scope="col" class="col-date">Date</th>
            <th scope="col" class="col-message">Message</th>
            <th scope="col" class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="mtk-archived-tbody" aria-live="polite"></tbody>
      </table>
    </div>
    <div class="mtka-empty" id="mtk-empty-archived" hidden aria-live="polite">
      <span class="material-icons" aria-hidden="true">inventory_2</span>
      <p>Nothing archived yet.</p>
    </div>
  </div>

</mtk-alerts>

<script src="alerts/mtk-alerts.config.js"></script>
<script src="alerts/mtk-alerts.js"></script>
