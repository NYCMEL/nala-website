	<script>
	 // INITIAL PAGE
	 wc.getSession(function (loggedIn, session, err) {
	     if (err) return;

	     if (wc.working) {
		 wc.timeout(function(){
		     MTKMsgs.show({
			 type: 'success',
			 icon: 'check_circle',
			 // i18n-aware loading message
			 message: window.i18n ? i18n.t('loading.message') : 'Loading in progress. Please wait...',
			 buttons: [],
			 closable: false,
			 timer: 3,
			 block: true
		     });
		 }, 100, 1);
	     }

	     if (loggedIn) {
		 try {
		     wc.timeout(function(){
			 wc.pages.show('dashboard');

			 $(".app-header").hide(function() {
			     $("#header-private").show();
			 });
		     }, 300, 1);

		     wc.log('IS LOGGED IN');
		 } catch(e) {
		     console.error(e.name + ' > ' + e.message);
		 }
	     } else {
		 wc.log('IS NOT LOGGED IN');

		 $(".app-header").hide(function() {
		     $("#header-public").show();
		 });
	     }
	 });

	 function checkFooter() {
	     const footer = document.getElementById("page-footer");
	     if (!footer) return;

	     let rafId = null;

	     function adjustFooter() {
		 const docHeight      = document.documentElement.scrollHeight;
		 const viewportHeight = window.innerHeight;
		 const footerHeight   = footer.offsetHeight || 0;
		 document.documentElement.style.setProperty('--page-footer-height', footerHeight + 'px');

		 if (docHeight <= (viewportHeight + 1)) {
		     footer.style.position = "fixed";
		     footer.style.bottom   = "0";
		     footer.style.left     = "0";
		     footer.style.width    = "100%";
		     document.body.classList.add('footer-fixed');
		     document.body.style.paddingBottom = footerHeight + "px";
		 } else {
		     footer.style.position = "static";
		     footer.style.bottom   = "";
		     footer.style.left     = "";
		     footer.style.width    = "";
		     document.body.classList.remove('footer-fixed');
		     document.body.style.paddingBottom = "0";
		 }
	     }

	     function scheduleAdjust() {
		 if (rafId !== null) cancelAnimationFrame(rafId);
		 rafId = requestAnimationFrame(function() {
		     rafId = null;
		     adjustFooter();
		 });
	     }

	     window.addEventListener("load",              scheduleAdjust);
	     window.addEventListener("resize",            scheduleAdjust);
	     window.addEventListener("orientationchange", scheduleAdjust);

	     const observer = new MutationObserver(scheduleAdjust);
	     observer.observe(document.body, { childList: true, subtree: true, attributes: true });

	     setTimeout(scheduleAdjust, 50);
	     setTimeout(scheduleAdjust, 300);
	     setTimeout(scheduleAdjust, 800);
	 }
	</script>
