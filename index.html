	<meta charset="UTF-8">

	<!-- W3C LOGGING -->

	<!-- COMMON STUFF -->

    <body id="wc">
	<!-- YOUR CODE FROM HERE... -->

	<!-- DIALOG FOR LATER USE-->
	<div>
	    <wc-include href="dialog/index.inc.html" />
	</div>

	<!-- MSGS -->
	<div>
	    <wc-include href="msg/mtk-msgs.html" />
	</div>

	<!-- PAGES -->
	<div>
	    <wc-include href="pages/index.inc.html" />
	    
	    <script src="pages/mtk-pages.config.js"></script>
	    <script src="pages/mtk-pages.js"></script>
	</div>

	<!-- YOUR CODE TO HERE... -->

	<script>
	 // INITIAL PAGE
	 wc.getSession(function (loggedIn, session, err) {
	     if (err) return;
	     
	     if (wc.working) {
		 wc.timeout(function(){
		     MTKMsgs.show({
			 type: 'success',
			 icon: 'check_circle',
			 message: 'Loading in progress. Please wait...',
			 buttons: [],
			 closable: false, // No X button
			 timer: 3, // Auto-close after 5 seconds
			 block: true
		     });
		 }, 100, 1);
	     }

	     if (loggedIn) {
		 try {
		     wc.timeout(function(){
			 wc.pages.show('dashboard');

			 // SHOW PUBLIC HEADER
			 $(".app-header").hide(function() {
			     $("#header-private").show();
			 });
		     }, 300, 1);

		     wc.log('IS LOGGED IN');
		 } catch(e) {
		     console.error(e.name + ' > ' + e.message);
		 }
	     } else {
		 wc.log('IS NOT LOGGED IN');
		 
		 // SHOW PUBLIC HEADER
		 $(".app-header").hide(function() {
		     $("#header-public").show();
		 });
	     }
	 });
	</script>

	<!-- YOUR CODE TO HERE -->
    </body>
</html>
