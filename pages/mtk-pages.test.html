<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mtk-pages | Test</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Roboto', sans-serif;
        }

        /* NAV BAR */
        .mtk-test-nav {
            background: #1e1e1e;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .mtk-test-nav__label {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-right: 8px;
            white-space: nowrap;
        }

        .mtk-test-nav__btn {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.87);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: background 200ms ease, color 200ms ease;
            white-space: nowrap;
        }

        .mtk-test-nav__btn:hover {
            background: rgba(255,255,255,0.18);
            color: #fff;
        }

        .mtk-test-nav__btn.active {
            background: #bb86fc;
            color: #000;
            border-color: #bb86fc;
            font-weight: 500;
        }

        /* PAGE CONTENT AREA */
        .mtk-test-content {
            padding: 32px 24px;
        }

        /* PAGE PANEL */
        .mtk-test-page {
            display: none;
            animation: fadeIn 200ms ease;
        }

        .mtk-test-page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* PAGE CARD */
        .mtk-test-card {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            padding: 0;
            overflow: hidden;
        }

        .mtk-test-card__header {
            background: #1e1e1e;
            color: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }

        .mtk-test-card__header-label {
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .mtk-test-card__header-meta {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-family: monospace;
        }

        .mtk-test-card__body {
            padding: 24px;
            min-height: 200px;
        }

        /* IFRAME for HTML preview */
        .mtk-test-iframe {
            width: 100%;
            min-height: 500px;
            border: none;
            display: block;
        }

        /* BADGE */
        .mtk-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .mtk-badge--cache-true  { background: #e8f5e9; color: #2e7d32; }
        .mtk-badge--cache-false { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>

    <!-- NAV BUTTONS (built from config labels) -->
    <nav class="mtk-test-nav">
        <span class="mtk-test-nav__label">mtk-pages test</span>
        <div id="mtk-test-buttons" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </nav>

    <!-- PAGE PANELS -->
    <div class="mtk-test-content">
        <div id="mtk-test-pages"></div>
    </div>

    <script src="mtk-pages.config.js"></script>
    <script>
     (function () {

         const pages   = window.app.pages;
         const btnWrap = document.getElementById('mtk-test-buttons');
         const pageWrap = document.getElementById('mtk-test-pages');

         // Extract href from a wc-include string
         function extractHref(urlStr) {
             const match = urlStr.match(/href=['"]([^'"]+)['"]/);
             return match ? match[1] : null;
         }

         // Show a page panel and mark its button active
         function showPage(pageId) {
             // Deactivate all panels
             document.querySelectorAll('.mtk-test-page').forEach(el => el.classList.remove('active'));
             // Deactivate all buttons
             document.querySelectorAll('.mtk-test-nav__btn').forEach(el => el.classList.remove('active'));

             // Activate target panel
             const panel = document.getElementById('panel-' + pageId);
             if (panel) panel.classList.add('active');

             // Activate target button
             const btn = document.getElementById('btn-' + pageId);
             if (btn) btn.classList.add('active');

             // Load iframe if not yet loaded
             const iframe = document.getElementById('iframe-' + pageId);

             if (iframe && !iframe.getAttribute('data-loaded')) {
                 const href = iframe.getAttribute('data-src');
                 iframe.src = href;
		 console.log("-------", iframe.src);
		 
                 iframe.setAttribute('data-loaded', 'true');
             }
         }
	 
	 // Build buttons and page panels from config
	 pages.forEach(function (page) {
	     const href = extractHref(page.url);

	     // BUTTON
	     const btn = document.createElement('button');
	     btn.id        = 'btn-' + page.page;
	     btn.className = 'mtk-test-nav__btn';
	     btn.textContent = page.label;
	     btn.addEventListener('click', function () { showPage(page.page); });
	     btnWrap.appendChild(btn);

	     // PAGE PANEL
	     const cacheClass = page.cache === 'true' ? 'mtk-badge--cache-true' : 'mtk-badge--cache-false';
	     const cacheText  = page.cache === 'true' ? 'cached' : 'no cache';

	     const panel = document.createElement('div');
	     panel.id        = 'panel-' + page.page;
	     panel.className = 'mtk-test-page';
	     panel.innerHTML = `
		 <div class="mtk-test-card">
		     <div class="mtk-test-card__header">
			 <span class="mtk-test-card__header-label">${page.label}</span>
			 <span class="mtk-test-card__header-meta">
			     page: <strong style="color:#bb86fc">${page.page}</strong>
			     &nbsp;&nbsp;
			     <span class="mtk-badge ${cacheClass}">${cacheText}</span>
			     &nbsp;&nbsp;
			     ${href ? `<a href="${href}" target="_blank" style="color:rgba(255,255,255,0.5);font-size:11px;text-decoration:none;" title="Open in new tab">&#x2197; ${href}</a>` : 'no href'}
                            </span>
                        </div>
                        <div class="mtk-test-card__body" style="padding:0">
                            ${href
                                ? `<iframe id="iframe-${page.page}" class="mtk-test-iframe" data-src="${href}" title="${page.label}"></iframe>`
                                : `<div style="padding:24px;color:#999">No URL found in config for this page.</div>`
                            }
                        </div>
                    </div>
				`;
	     pageWrap.appendChild(panel);
	 });

	 // Show first page by default
	 if (pages.length) {
	     showPage(pages[0].page);
	 }

     })();
    </script>
</body>
</html>
