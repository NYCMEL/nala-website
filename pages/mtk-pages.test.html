<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>mtk-pages | Test</title>

	<!-- Bootstrap 5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- jQuery (for $.ajax / wc-include compatibility) -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

	<style>
         body {
             background: #f5f5f5;
             font-family: 'Roboto', sans-serif;
         }

         /* NAV BAR */
         .mtk-test-nav {
             background: #1e1e1e;
             padding: 12px 24px;
             display: flex;
             align-items: center;
             gap: 8px;
             flex-wrap: wrap;
             position: sticky;
             top: 0;
             z-index: 999;
             box-shadow: 0 2px 6px rgba(0,0,0,0.4);
         }

         .mtk-test-nav__label {
             color: rgba(255,255,255,0.5);
             font-size: 11px;
             letter-spacing: 1px;
             text-transform: uppercase;
             margin-right: 8px;
             white-space: nowrap;
         }

         .mtk-test-nav__btn {
             background: rgba(255,255,255,0.08);
             color: rgba(255,255,255,0.87);
             border: 1px solid rgba(255,255,255,0.15);
             padding: 6px 16px;
             font-size: 13px;
             cursor: pointer;
             transition: background 200ms ease, color 200ms ease;
             white-space: nowrap;
         }

         .mtk-test-nav__btn:hover {
             background: rgba(255,255,255,0.18);
             color: #fff;
         }

         .mtk-test-nav__btn.active {
             background: #bb86fc;
             color: #000;
             border-color: #bb86fc;
             font-weight: 500;
         }

         /* PAGE CONTENT AREA */
         .mtk-test-content {
             padding: 32px 24px;
         }

         /* PAGE CARD */
         .mtk-test-card {
             background: #fff;
             box-shadow: 0 2px 8px rgba(0,0,0,0.12);
             overflow: hidden;
             animation: fadeIn 200ms ease;
         }

         @keyframes fadeIn {
             from { opacity: 0; transform: translateY(6px); }
             to   { opacity: 1; transform: translateY(0); }
         }

         .mtk-test-card__header {
             background: #1e1e1e;
             color: #fff;
             padding: 12px 20px;
             display: flex;
             align-items: center;
             justify-content: space-between;
             font-size: 13px;
         }

         .mtk-test-card__header-label {
             font-weight: 500;
             letter-spacing: 0.5px;
         }

         .mtk-test-card__header-meta {
             color: rgba(255,255,255,0.5);
             font-size: 11px;
             font-family: monospace;
         }

         .mtk-test-card__body {
             padding: 24px;
             min-height: 200px;
         }

         .mtk-test-card__body--loading {
             color: #999;
             font-size: 13px;
             padding: 24px;
         }

         /* BADGE */
         .mtk-badge {
             display: inline-block;
             font-size: 10px;
             padding: 2px 8px;
             border-radius: 2px;
             font-weight: 600;
             letter-spacing: 0.5px;
             text-transform: uppercase;
         }

         .mtk-badge--cache-true  { background: #e8f5e9; color: #2e7d32; }
         .mtk-badge--cache-false { background: #fff3e0; color: #e65100; }
	</style>
    </head>
    <body>

	<!-- NAV BUTTONS (built from config labels) -->
	<nav class="mtk-test-nav">
            <span class="mtk-test-nav__label">mtk-pages test</span>
            <div id="mtk-test-buttons" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
	</nav>

	<!-- SINGLE CONTENT AREA -->
	<div class="mtk-test-content">
            <div id="mtk-test-stage"></div>
	</div>

	<script src="mtk-pages.config.js"></script>
	<script>
         (function () {

             const pages   = window.app.pages;
             const btnWrap = document.getElementById('mtk-test-buttons');
             const stage   = document.getElementById('mtk-test-stage');

             // Cache: store loaded HTML per page id
             const cache = {};

             // Extract href from either a plain URL or a wc-include string, always ending in .html
             function extractHref(urlStr) {
                 if (!urlStr) return null;
                 const match = urlStr.match(/href=['"]([^'"]+)['"]/);
                 const href  = match ? match[1] : urlStr.trim();
                 return href.endsWith('.html') ? href : href + '.html';
             }

             // Render the stage for the given page config object
             function renderStage(page, html) {
                 const cacheClass = page.cache === 'true' ? 'mtk-badge--cache-true' : 'mtk-badge--cache-false';
                 const cacheText  = page.cache === 'true' ? 'cached' : 'no cache';
                 const href       = extractHref(page.url);

                 stage.innerHTML = '';

                 const card = document.createElement('div');
                 card.className = 'mtk-test-card';
                 card.innerHTML =
                     '<div class="mtk-test-card__header">' +
                     '<span class="mtk-test-card__header-label">' + page.label + '</span>' +
                     '<span class="mtk-test-card__header-meta">' +
                     'page: <strong style="color:#bb86fc">' + page.page + '</strong>' +
                     '&nbsp;&nbsp;' +
                     '<span class="mtk-badge ' + cacheClass + '">' + cacheText + '</span>' +
                     '&nbsp;&nbsp;' +
                             (href ? '<a href="' + href + '" target="_blank" style="color:rgba(255,255,255,0.5);font-size:11px;text-decoration:none;" title="Open in new tab">&#x2197; ' + href + '</a>' : 'no href') +
                     '</span>' +
                     '</div>' +
                     '<div class="mtk-test-card__body">' + (html || '') + '</div>';

                 stage.appendChild(card);
             }

             // Show a page - fetch HTML and inject into stage div
             function showPage(pageId) {
                 const page = pages.find(function(p) { return p.page === pageId; });
                 if (!page) return;

                 const href = extractHref(page.url);

                 // Mark active button
                 document.querySelectorAll('.mtk-test-nav__btn').forEach(function(el) {
                     el.classList.remove('active');
                 });
                 const activeBtn = document.getElementById('btn-' + pageId);
                 if (activeBtn) activeBtn.classList.add('active');

                 // If cached and already loaded, render from cache
                 if (page.cache === 'true' && cache[pageId]) {
                     renderStage(page, cache[pageId]);
                     return;
                 }

                 // Show loading state
                 renderStage(page, '<div class="mtk-test-card__body--loading">Loading...</div>');

                 if (!href) {
                     renderStage(page, '<div style="color:#999;font-size:13px;">No URL configured for this page.</div>');
                     return;
                 }

                 // Fetch and inject HTML into the div
                 $.ajax({
                     url:      href,
                     method:   'GET',
                     dataType: 'html',
                     success: function(html) {
                         if (page.cache === 'true') {
                             cache[pageId] = html;
                         }
                         renderStage(page, html);
                     },
                     error: function() {
                         renderStage(page, '<div style="color:#c00;font-size:13px;">Could not load: ' + href + '</div>');
                     }
                 });
             }

             // Build nav buttons from config
             pages.forEach(function(page) {
                 const btn       = document.createElement('button');
                 btn.id          = 'btn-' + page.page;
                 btn.className   = 'mtk-test-nav__btn';
                 btn.textContent = page.label;
                 btn.addEventListener('click', function() { showPage(page.page); });
                 btnWrap.appendChild(btn);
             });

             // Show first page on load
             if (pages.length) {
                 showPage(pages[0].page);
             }

         })();
	</script>
    </body>
</html>
