<!-- mtk-pages usage -->

<!-- 1. Load config before the component script -->
<script src="pages/mtk-pages.config.js"></script>
<script src="pages/mtk-pages.js"></script>

<!-- 2. Place the component in your HTML -->
<mtk-pages
    id="mtk-pages"
    cfg=""
    page="home"
    env="prod">
</mtk-pages>

<!-- 3. Show a page programmatically -->
<script>
    // Show a page by ID
    document.querySelector('mtk-pages').show('dashboard');

    // Or use the element reference directly
    const pages = document.getElementById('mtk-pages');
    pages.show('login');

    // Add a new page at runtime
    pages.new({
        page:  "profile",
        url:   "profile/index.inc.html",
        cache: "true"
    });

    // Refresh a page (clear cache and reload)
    pages.refresh('dashboard');
</script>
