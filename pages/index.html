	<script>

	 function nalaShowRegister() {
	     window.__nalaRequestedPublicPage = "register";
	     const pagesRef = wc.pages || document.getElementById("mtk-pages");
	     if (pagesRef && typeof pagesRef.show === "function") {
	         wc.pages = pagesRef;
	         wc.pages.show("register", { replaceHistory: true });
	     }
	 }
	 // INITIAL PAGE
	 wc.getSession(function (loggedIn, session, err) {
	     if (err) return;
	     
	     if (loggedIn) {
		 try {
		     wc.timeout(function(){
			 wc.pages.show('dashboard');

			 // SHOW PUBLIC HEADER
			 $(".app-header").hide(function() {
			     $("#header-private").show();
			 });
		     }, 200, 1);

		     wc.log('IS LOGGED IN');
		 } catch(e) {
		     console.error(e.name + ' > ' + e.message);
		 }
	     } else {
		 wc.log('IS NOT LOGGED IN');
		 if (window.__nalaRequestedPublicPage === 'register') {
		     nalaShowRegister();
		 } else {
		     wc.pages.show('home');
		 }
		 
		 // SHOW PUBLIC HEADER
		 $(".app-header").hide(function() {
		     $("#header-public").show();
		 });
	     }
	 });

	 function checkFooter() {
	     const footer = document.getElementById("page-footer");
	     if (!footer) return;

	     function adjustFooter() {
		 const docHeight = document.documentElement.scrollHeight;
		 const viewportHeight = window.innerHeight;

		 if (docHeight <= viewportHeight) {
		     footer.style.position = "fixed";
		     footer.style.bottom = "0";
		     footer.style.left = "0";
		     footer.style.width = "100%";
		 } else {
		     footer.style.position = "static";
		 }
	     }

	     // Run after layout is truly ready
	     window.addEventListener("load", adjustFooter);
	     window.addEventListener("resize", adjustFooter);

	     // Extra safety: re-run after fonts/images
	     setTimeout(adjustFooter, 50);
	 }
	</script>
