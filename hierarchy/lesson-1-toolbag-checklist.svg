<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1700" viewBox="0 0 1400 1700" role="img" aria-labelledby="title desc">
  <title id="title">NALA Lesson 1 Toolbag Checklist</title>
  <desc id="desc">A checklist image listing the tools needed for the first locksmith training lesson.</desc>
  <rect width="1400" height="1700" fill="#f7f0e2"/>
  <rect x="70" y="70" width="1260" height="1560" rx="26" fill="#ffffff"/>
  <rect x="70" y="70" width="1260" height="230" rx="26" fill="#171f2f"/>
  <rect x="70" y="250" width="1260" height="80" fill="#171f2f"/>
  <circle cx="190" cy="185" r="62" fill="#d7a642"/>
  <path d="M162 186h56M190 158v56" stroke="#171f2f" stroke-width="18" stroke-linecap="round"/>
  <text x="280" y="155" fill="#f7f0e2" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">NALA Locksmith Training</text>
  <text x="280" y="225" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">Lesson 1 Toolbag Checklist</text>
  <text x="280" y="278" fill="#d8e0ee" font-family="Inter, Arial, sans-serif" font-size="28">Core beginner kit from "The tools needed in your toolbag"</text>

  <g font-family="Inter, Arial, sans-serif" font-size="28" fill="#1f2937">
    <g transform="translate(130 400)">
      <text x="0" y="0" font-size="30" font-weight="800" fill="#171f2f">Carry and hand tools</text>
      <g transform="translate(0 58)">
        <circle cx="20" cy="-8" r="14" fill="#f0c46b"/><text x="54" y="0">Comfortable tool bag, preferably wheeled</text>
        <circle cx="20" cy="58" r="14" fill="#f0c46b"/><text x="54" y="66">Phillips-head screwdriver set</text>
        <circle cx="20" cy="124" r="14" fill="#f0c46b"/><text x="54" y="132">Flathead screwdriver set</text>
        <circle cx="20" cy="190" r="14" fill="#f0c46b"/><text x="54" y="198">Mini screwdriver set: Phillips and flathead</text>
        <circle cx="20" cy="256" r="14" fill="#f0c46b"/><text x="54" y="264">Hammer</text>
        <circle cx="20" cy="322" r="14" fill="#f0c46b"/><text x="54" y="330">Vice grips</text>
        <circle cx="20" cy="388" r="14" fill="#f0c46b"/><text x="54" y="396">Pliers</text>
        <circle cx="20" cy="454" r="14" fill="#f0c46b"/><text x="54" y="462">Needle-nose pliers</text>
      </g>
    </g>

    <g transform="translate(730 400)">
      <text x="0" y="0" font-size="30" font-weight="800" fill="#171f2f">Keys, bits, and drilling</text>
      <g transform="translate(0 58)">
        <circle cx="20" cy="-8" r="14" fill="#84b8a2"/><text x="54" y="0">Allen key set, multiple sizes</text>
        <circle cx="20" cy="58" r="14" fill="#84b8a2"/><text x="54" y="66">Torx key set</text>
        <circle cx="20" cy="124" r="14" fill="#84b8a2"/><text x="54" y="132">Hex key set, multiple sizes</text>
        <circle cx="20" cy="190" r="14" fill="#84b8a2"/><text x="54" y="198">Drill bits, all common sizes</text>
        <circle cx="20" cy="256" r="14" fill="#84b8a2"/><text x="54" y="264">1/4 in drill bit for many lock jobs</text>
        <circle cx="20" cy="322" r="14" fill="#84b8a2"/><text x="54" y="330">Impact drill, minimum 18V</text>
        <circle cx="20" cy="388" r="14" fill="#84b8a2"/><text x="54" y="396">Driver drill, minimum 18V</text>
        <circle cx="20" cy="454" r="14" fill="#84b8a2"/><text x="54" y="462">Driver bits: flathead, Phillips, and more</text>
      </g>
    </g>

    <g transform="translate(130 1010)">
      <text x="0" y="0" font-size="30" font-weight="800" fill="#171f2f">Entry and lock work</text>
      <g transform="translate(0 58)">
        <circle cx="20" cy="-8" r="14" fill="#83a8d8"/><text x="54" y="0">Angle grinder</text>
        <circle cx="20" cy="58" r="14" fill="#83a8d8"/><text x="54" y="66">Cutting discs or saws for padlocks</text>
        <circle cx="20" cy="124" r="14" fill="#83a8d8"/><text x="54" y="132">Chisel kit</text>
        <circle cx="20" cy="190" r="14" fill="#83a8d8"/><text x="54" y="198">Rekeying kit</text>
        <circle cx="20" cy="256" r="14" fill="#83a8d8"/><text x="54" y="264">Lock pick set</text>
        <circle cx="20" cy="322" r="14" fill="#83a8d8"/><text x="54" y="330">Key extractor kit</text>
      </g>
    </g>

    <g transform="translate(730 1010)">
      <text x="0" y="0" font-size="30" font-weight="800" fill="#171f2f">Vehicle and install kit</text>
      <g transform="translate(0 58)">
        <circle cx="20" cy="-8" r="14" fill="#c9917c"/><text x="54" y="0">Air wedge</text>
        <circle cx="20" cy="58" r="14" fill="#c9917c"/><text x="54" y="66">Reach rod</text>
        <circle cx="20" cy="124" r="14" fill="#c9917c"/><text x="54" y="132">Fresh installation kit</text>
      </g>
      <rect x="0" y="270" width="520" height="210" rx="22" fill="#f3f6fa" stroke="#d8e0ee" stroke-width="2"/>
      <text x="34" y="326" fill="#171f2f" font-size="28" font-weight="800">Setup note</text>
      <text x="34" y="382" fill="#475569" font-size="25">Start with the core list, then add</text>
      <text x="34" y="420" fill="#475569" font-size="25">specialty tools as your services expand.</text>
    </g>
  </g>

  <rect x="130" y="1515" width="1140" height="2" fill="#e4e9f1"/>
  <text x="130" y="1572" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24">Use this image as a quick shopping and field-readiness reference while completing Lesson 1.</text>
</svg>
