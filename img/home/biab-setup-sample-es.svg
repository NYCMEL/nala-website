<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 768" role="img" aria-labelledby="title desc">
  <title id="title">Vista previa de Negocio en una Caja</title>
  <desc id="desc">Captura ilustrada de la configuracion de Negocio en una Caja en espanol.</desc>
  <rect width="1040" height="768" fill="#fff"/>
  <text x="32" y="66" fill="#061531" font-family="Arial, sans-serif" font-size="36" font-weight="700">Negocio en una Caja</text>
  <text x="32" y="105" fill="#253653" font-family="Arial, sans-serif" font-size="18">Sigue los pasos abajo. Cada seccion te indica que hacer, que escribir y que ocurre despues.</text>
  <g font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#10213f">
    <text x="72" y="160" fill="#a98212">Introduccion</text>
    <text x="225" y="160">Constructor web</text>
    <text x="410" y="160">URL del sitio</text>
    <text x="565" y="160">Google SEO</text>
    <text x="720" y="160">Logo</text>
    <text x="835" y="160">Tarjeta</text>
    <text x="72" y="214">Facturas</text>
    <text x="205" y="214">Resenas</text>
  </g>
  <line x1="32" y1="178" x2="174" y2="178" stroke="#a98212" stroke-width="3"/>
  <g fill="#10213f">
    <circle cx="55" cy="155" r="9" fill="#a98212"/>
    <circle cx="210" cy="155" r="9" fill="none" stroke="#10213f" stroke-width="2"/>
    <rect x="384" y="148" width="18" height="10" rx="5"/>
    <circle cx="542" cy="155" r="9" fill="none" stroke="#10213f" stroke-width="2"/>
    <path d="M692 145l4 10 10 4-10 4-4 10-4-10-10-4 10-4z"/>
    <rect x="812" y="146" width="18" height="18" rx="3"/>
    <rect x="50" y="200" width="16" height="18" rx="2"/>
    <rect x="178" y="200" width="18" height="18" rx="3"/>
  </g>
  <line x1="32" y1="234" x2="1008" y2="234" stroke="#d9dde6"/>
  <rect x="32" y="255" width="976" height="472" rx="24" fill="#fff" stroke="#dfe3ea"/>
  <text x="64" y="302" fill="#a98212" font-family="Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="3">EMPEZAR</text>
  <text x="64" y="342" fill="#061531" font-family="Arial, sans-serif" font-size="29" font-weight="700">Comienza aqui</text>
  <text x="64" y="380" fill="#253653" font-family="Arial, sans-serif" font-size="18">Usa esta lista primero. Completa cada paso y vuelve aqui para continuar.</text>
  <rect x="64" y="424" width="820" height="76" rx="6" fill="#fffaf0" stroke="#d7a43b"/>
  <text x="116" y="455" fill="#322400" font-family="Arial, sans-serif" font-size="16" font-weight="700">Empieza con la configuracion del perfil de negocio. Ingresa el nombre, telefono,</text>
  <text x="116" y="480" fill="#322400" font-family="Arial, sans-serif" font-size="16" font-weight="700">correo, sitio web, area de servicio y servicios; luego continua.</text>
  <path d="M92 451h18m-7-7 7 7-7 7" fill="none" stroke="#a98212" stroke-width="3"/>
  <rect x="64" y="525" width="760" height="180" rx="14" fill="#fffdfa" stroke="#eadfca"/>
  <text x="88" y="570" fill="#061531" font-family="Arial, sans-serif" font-size="25" font-weight="700">Tu lista de configuracion</text>
  <text x="88" y="606" fill="#322400" font-family="Arial, sans-serif" font-size="17" font-weight="800">COSAS QUE DEBES HACER</text>
  <g font-family="Arial, sans-serif">
    <circle cx="98" cy="632" r="8" fill="none" stroke="#63708a" stroke-width="2"/>
    <text x="122" y="639" fill="#061531" font-size="16" font-weight="700" text-decoration="underline">Haz clic para ingresar la informacion de tu negocio</text>
    <rect x="438" y="621" width="92" height="24" rx="12" fill="#eef2f7"/>
    <text x="452" y="638" fill="#4d596d" font-size="13" font-weight="700">Pendiente</text>
    <text x="122" y="668" fill="#253653" font-size="14">Ingresa los datos que veran los clientes: nombre, telefono, correo, sitio web y horarios.</text>
    <circle cx="98" cy="719" r="8" fill="none" stroke="#63708a" stroke-width="2"/>
    <text x="122" y="726" fill="#061531" font-size="16" font-weight="700" text-decoration="underline">Haz clic para elegir los servicios ofrecidos</text>
  </g>
</svg>
