<mtk-request class="mtk-request">
    <div class="card shadow-sm">
	<h4 class="mb-3"></h4>

	<form>
	    <div class="mb-3">
		<label></label>
		<input type="text" class="form-control name" required />
	    </div>

	    <div class="mb-3">
		<label></label>
		<input type="email" class="form-control email" required />
	    </div>

	    <div class="mb-3">
		<label></label>
		<input type="tel" class="form-control phone" />
	    </div>

	    <div class="mb-3">
		<label></label>
		<input type="text" class="form-control address" />
	    </div>

	    <div class="mb-3">
		<label></label>
		<textarea class="form-control help" rows="3"></textarea>
	    </div>

	    <div class="mb-3">
		<label>Preferred Contact Method</label>
		<select class="form-select contact-type">
		</select>
	    </div>

	    <div class="mb-3 phone-times">
		<label>Best Time to Call</label>
		<select class="form-select call-time"></select>
	    </div>

	    <button type="submit" class="btn btn-primary w-100">
		Submit Request
	    </button>
	</form>
    </div>
</mtk-request>
