<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK BIAB</title>

  <!-- Google Fonts: Google Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <!-- Bootstrap 5 (layout only) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- mtk-biab compiled styles (link your compiled CSS here) -->
  <link rel="stylesheet" href="mtk-biab.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f1f3f4;
    }
  </style>
</head>
<body>

  <!--
    mtk-biab root element.
    Dynamically included via <wc-include> or inserted directly.
    JS waits for DOMContentLoaded / MutationObserver before initializing.
  -->
  <mtk-biab class="mtk-biab" role="main" aria-label="Business In A Box">

    <div class="mtk-biab__loading" aria-live="polite" aria-label="Loading content">
      <div class="mtk-biab__loading-spinner" aria-hidden="true"></div>
      <span>Loading…</span>
    </div>

    <!--
      The following structure is injected by mtk-biab.js
      after config is resolved and DOM is ready.
      Shown here for reference / SSR fallback.
    -->

  </mtk-biab>

  <!-- Config must load before the component JS -->
  <script src="mtk-biab.config.js"></script>
  <script src="mtk-biab.js"></script>

</body>
</html>
