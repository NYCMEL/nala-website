<link href="login/mtk-login.css" rel="stylesheet">

<mtk-login class="mtk-login">
    <div class="mtk-login-content shadow">
	<h2 class="mtk-login-title" data-i18n="login.title"></h2>
	<form novalidate>
	    <div class="form-group">
		<label for="mtk-email" data-i18n="login.email.label"></label>
		<input type="email" id="mtk-email" name="email" autocomplete="username"
		       data-i18n-placeholder="login.email.placeholder" />
		<div class="error"></div>
	    </div>

	    <div class="form-group">
		<label for="mtk-password" data-i18n="login.password.label"></label>
		<input type="password" id="mtk-password" name="password" autocomplete="off"
		       data-i18n-placeholder="login.password.placeholder" />
		<div class="error"></div>
	    </div>

	    <button type="submit" data-i18n="login.submit"></button>

	    <div class="links">
		<a href="#" class="forgot-password" data-i18n="login.forgot"></a>
		<a href="#" class="register" data-i18n="login.register"></a>
	    </div>
	</form>
    </div>
</mtk-login>

<script src="login/mtk-login.config.js"></script>
<script src="login/mtk-login.js"></script>
