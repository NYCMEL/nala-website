<link href="settings/mtk-settings.css" rel="stylesheet">

<!-- mtk-settings Component -->
<mtk-settings class="mtk-settings">
    <div class="mtk-settings__card">
	<!-- Header -->
	<div class="container">
	    <div class="row">
		<div class="mtk-settings__header">
		    <h2 id="mtk-settings-title" data-i18n="settings.title">Profile & Settings</h2>
		</div>
	    </div>
	</div>

	<div class="container">
	    <div class="row">
		<div class="col-md-4 border border-left pt-2 mt-3">
		    <div class="bg-warning p-2" style="border-radius:4px;">
			<span id="mtk-settings-privacy-title" class="fb" style="font-size:larger;padding-left:10px;" data-i18n="settings.privacyTitle">Privacy Settings</span>
		    </div>

		    <!-- Content -->
		    <div class="mtk-settings__content">
			<!-- Full Name (Read-only) -->
			<div class="mtk-settings__form-group">
			    <label class="mtk-settings__label" for="mtk-settings-fullname" data-i18n="settings.userName">
				Full Name
			    </label>
			    <div class="mtk-settings__input-wrapper">
				<input 
				    type="text" 
				    id="mtk-settings-fullname" 
				    class="mtk-settings__input mtk-settings__input--readonly" 
				    readonly 
				    value=""
				    aria-label="Full Name"
				    tabindex="0"
				/>
			    </div>
			</div>
			
			<!-- Email Address (Read-only) -->
			<div class="mtk-settings__form-group">
			    <label class="mtk-settings__label" for="mtk-settings-email" data-i18n="settings.userEmail">
				Email Address
			    </label>
			    <div class="mtk-settings__input-wrapper">
				<input 
				    type="email" 
				    id="mtk-settings-email" 
				    class="mtk-settings__input mtk-settings__input--readonly" 
				    readonly 
				    value=""
				    aria-label="Email Address"
				    tabindex="0"
				/>
			    </div>
			</div>
			
			<!-- Current Password -->
			<div class="mtk-settings__form-group">
			    <label class="mtk-settings__label" for="mtk-settings-current-password" data-i18n="settings.currentPassword">
				Current Password
			    </label>
			    <div class="mtk-settings__input-wrapper">
				<input 
				    type="password" 
				    id="mtk-settings-current-password" 
				    class="mtk-settings__input mtk-settings__input--password" 
				    value=""
				    disabled
				    aria-label="Current Password"
				    autocomplete="current-password"
				/>
			    </div>
			    <div class="mtk-settings__actions">
				<button 
				    type="button" 
				    class="mtk-settings__btn mtk-settings__btn--primary" 
				    id="mtk-settings-update-btn"
				    aria-label="Update Password"
				>
				    <span class="material-icons">edit</span>
				    <span data-i18n="settings.updateButton">Update</span>
				</button>
			    </div>
			</div>
			
			<!-- New Password (Hidden by default) -->
			<div class="mtk-settings__form-group mtk-settings__hidden" id="mtk-settings-new-password-group">
			    <label class="mtk-settings__label" for="mtk-settings-new-password" data-i18n="settings.newPassword">
				New Password
			    </label>
			    <div class="mtk-settings__input-wrapper">
				<input 
				    type="password" 
				    id="mtk-settings-new-password" 
				    class="mtk-settings__input mtk-settings__input--password" 
				    placeholder="Enter new password"
				    data-i18n-placeholder="settings.newPasswordPlaceholder"
				    aria-label="New Password"
				    autocomplete="new-password"
				    aria-describedby="mtk-settings-password-strength-text mtk-settings-new-password-error"
				/>
			    </div>
			    <div class="mtk-settings__password-strength" id="mtk-settings-password-strength">
				<span id="mtk-settings-password-strength-text" data-i18n="settings.passwordStrength">Password strength:</span>
				<div class="mtk-settings__password-strength-bar">
				    <div class="mtk-settings__password-strength-bar-fill" id="mtk-settings-password-strength-fill"></div>
				</div>
			    </div>
			    <div class="mtk-settings__error mtk-settings__hidden" id="mtk-settings-new-password-error" role="alert">
				<span class="material-icons">error</span>
				<span id="mtk-settings-new-password-error-text"></span>
			    </div>
			</div>
			
			<!-- Confirm Password (Hidden by default) -->
			<div class="mtk-settings__form-group mtk-settings__hidden" id="mtk-settings-confirm-password-group">
			    <label class="mtk-settings__label" for="mtk-settings-confirm-password" data-i18n="settings.confirmPassword">
				Confirm New Password
			    </label>
			    <div class="mtk-settings__input-wrapper">
				<input 
				    type="password" 
				    id="mtk-settings-confirm-password" 
				    class="mtk-settings__input mtk-settings__input--password" 
				    placeholder="Re-enter new password"
				    data-i18n-placeholder="settings.confirmPasswordPlaceholder"
				    aria-label="Confirm New Password"
				    autocomplete="new-password"
				    aria-describedby="mtk-settings-confirm-password-error"
				/>
			    </div>
			    <div class="mtk-settings__error mtk-settings__hidden" id="mtk-settings-confirm-password-error" role="alert">
				<span class="material-icons">error</span>
				<span id="mtk-settings-confirm-password-error-text"></span>
			    </div>
			</div>
			
			<!-- Action Buttons (Hidden by default) -->
			<div class="mtk-settings__actions mtk-settings__hidden" id="mtk-settings-save-actions">
			    <button 
				type="button" 
				      class="mtk-settings__btn mtk-settings__btn--text" 
				      id="mtk-settings-cancel-btn"
				      aria-label="Cancel"
			    >
				<span data-i18n="settings.cancelButton">Cancel</span>
			    </button>
			    <button type="button" class="mtk-settings__btn mtk-settings__btn--primary" id="mtk-settings-save-btn" aria-label="Save Changes">
				<span class="material-icons">save</span>
				<span data-i18n="settings.saveButton">Save Changes</span>
			    </button>
			</div>
		    </div>
		</div>

		<!-- <div class="col-md-4 border border-left pt-2">
		     <div class="bg-warning p-2">
		     <h5 id="mtk-settings-title">Application Settings</h5>
		     </div>

		     <h5 id="mtk-settings-title"></h5>
		     <p>Coming soon...</p>
		     </div>

		     <div class="col-md-4 border border-left pt-2">
		     <div class="bg-warning p-2">
		     <h5 id="mtk-settings-title">Other related stuff</h5>
		     </div>

		     <p>Coming soon...</p>
		     </div> -->
	    </div>
	</div>
    </div>
</mtk-settings>

<script src="settings/mtk-settings.config.js"></script>
<script src="settings/mtk-settings.js"></script>
