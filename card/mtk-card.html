<mtk-card class="mtk-card">
  <section class="mtk-card__comparison" aria-label="Business card comparison">
    <article class="mtk-card__panel" aria-label="Generated business card">
      <div class="mtk-card__card" tabindex="0">
        <div class="mtk-card__row mtk-card__row--top">
          <div class="mtk-card__logo-block">
            <div class="mtk-card__key" aria-hidden="true">
              <span class="mtk-card__key-head"></span>
              <span class="mtk-card__key-shaft"></span>
            </div>

            <div class="mtk-card__field mtk-card__field--logo">
              <span class="mtk-card__label" data-label="logoText" tabindex="0"></span>
              <span class="mtk-card__logo-text" data-field="logoText"></span>
            </div>
          </div>

          <div class="mtk-card__person-block">
            <div class="mtk-card__field mtk-card__field--person-name">
              <span class="mtk-card__label" data-label="personName" tabindex="0"></span>
              <span data-field="personName"></span>
            </div>

            <div class="mtk-card__field mtk-card__field--person-title">
              <span class="mtk-card__label" data-label="personTitle" tabindex="0"></span>
              <span data-field="personTitle"></span>
            </div>
          </div>
        </div>

        <div class="mtk-card__row mtk-card__row--middle">
          <div class="mtk-card__field mtk-card__field--company">
            <span class="mtk-card__label" data-label="companyName" tabindex="0"></span>
            <span data-field="companyName"></span>
          </div>
        </div>

        <div class="mtk-card__row mtk-card__row--bottom">
          <address class="mtk-card__address-block">
            <div class="mtk-card__field mtk-card__field--address">
              <span class="mtk-card__label" data-label="addressLine1" tabindex="0"></span>
              <span data-field="addressLine1"></span>
            </div>

            <div class="mtk-card__field mtk-card__field--address">
              <span class="mtk-card__label" data-label="addressLine2" tabindex="0"></span>
              <span data-field="addressLine2"></span>
            </div>
          </address>

          <div class="mtk-card__contact-block">
            <div class="mtk-card__field mtk-card__field--phone">
              <span class="mtk-card__label" data-label="phone" tabindex="0"></span>
              <span data-field="phoneLabel"></span>
              <span data-field="phone"></span>
            </div>

            <div class="mtk-card__field mtk-card__field--email">
              <span class="mtk-card__label" data-label="email" tabindex="0"></span>
              <span data-field="email"></span>
            </div>
          </div>
        </div>
      </div>
    </article>

    <article class="mtk-card__panel mtk-card__panel--reference" aria-label="Original business card">
      <img class="mtk-card__reference-image" data-field-image="src" alt="Original locksmith business card reference">
    </article>
  </section>
</mtk-card>
