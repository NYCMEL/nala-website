<mtk-card class="mtk-card">
  <section class="mtk-card__container" tabindex="0" aria-label="Business Card">

    <div class="mtk-card__top row">

      <div class="col-6">
        <div class="mtk-card__logo-area">
          <div class="mtk-card__logo-icon"></div>

          <div class="mtk-card__logo-wrapper">
            <div class="mtk-card__logo-text" data-field="logoText"></div>
          </div>
        </div>
      </div>

      <div class="col-6 text-end">
        <div class="mtk-card__field-wrapper mtk-card__person-name-wrapper">
          <div class="mtk-card__label" data-label="personName"></div>
          <div class="mtk-card__person-name" data-field="personName"></div>
        </div>

        <div class="mtk-card__field-wrapper mtk-card__person-title-wrapper">
          <div class="mtk-card__label" data-label="personTitle"></div>
          <div class="mtk-card__person-title" data-field="personTitle"></div>
        </div>
      </div>

    </div>

    <div class="mtk-card__middle text-center">

      <div class="mtk-card__field-wrapper mtk-card__company-wrapper">
        <div class="mtk-card__label" data-label="companyName"></div>
        <div class="mtk-card__company-name" data-field="companyName"></div>
      </div>

    </div>

    <div class="mtk-card__bottom row">

      <div class="col-6">

        <div class="mtk-card__field-wrapper">
          <div class="mtk-card__label" data-label="addressLine1"></div>
          <div class="mtk-card__address-line" data-field="addressLine1"></div>
        </div>

        <div class="mtk-card__field-wrapper">
          <div class="mtk-card__label" data-label="addressLine2"></div>
          <div class="mtk-card__address-line" data-field="addressLine2"></div>
        </div>

      </div>

      <div class="col-6 text-end">

        <div class="mtk-card__field-wrapper">
          <div class="mtk-card__label" data-label="phone"></div>
          <div class="mtk-card__contact-line">
            Tel:
            <span data-field="phone"></span>
          </div>
        </div>

        <div class="mtk-card__field-wrapper">
          <div class="mtk-card__label" data-label="email"></div>
          <div class="mtk-card__contact-line" data-field="email"></div>
        </div>

      </div>

    </div>

  </section>
</mtk-card>
