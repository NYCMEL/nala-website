<mtk-card class="mtk-card">
  <section class="mtk-card__comparison container-fluid" aria-label="Business card comparison">
    <div class="row g-4 align-items-start justify-content-center">
      <article class="col-md-6 mtk-card__column" aria-label="Generated locksmith business card">
        <div class="mtk-card__left-panel">
          <div class="mtk-card__business-card" data-mtk-download-card tabindex="0">
            <div class="mtk-card__logo-mark" aria-hidden="true">
              <span class="mtk-card__key-head"></span>
              <span class="mtk-card__key-hole"></span>
              <span class="mtk-card__key-shaft"></span>
            </div>

            <div class="mtk-card__copy mtk-card__copy--logo" data-mtk-field="logoText" tabindex="0"></div>
            <div class="mtk-card__copy mtk-card__copy--person-name" data-mtk-field="personName" tabindex="0"></div>
            <div class="mtk-card__copy mtk-card__copy--person-title" data-mtk-field="personTitle" tabindex="0"></div>
            <div class="mtk-card__copy mtk-card__copy--company" data-mtk-field="companyName" tabindex="0"></div>

            <address class="mtk-card__address" aria-label="Business address">
              <div class="mtk-card__copy mtk-card__copy--address" data-mtk-field="addressLine1" tabindex="0"></div>
              <div class="mtk-card__copy mtk-card__copy--address" data-mtk-field="addressLine2" tabindex="0"></div>
            </address>

            <div class="mtk-card__contact" aria-label="Business contact information">
              <div class="mtk-card__copy mtk-card__copy--phone" tabindex="0">
                <span data-mtk-field="phonePrefix"></span>
                <span data-mtk-field="phone"></span>
              </div>
              <div class="mtk-card__copy mtk-card__copy--email" data-mtk-field="email" tabindex="0"></div>
            </div>
          </div>

          <button class="mtk-card__download-button" type="button" data-mtk-download-button>
            <span class="material-icons mtk-card__download-icon" aria-hidden="true">download</span>
            <span data-mtk-download-label>Download Card</span>
          </button>
        </div>
      </article>

      <article class="col-md-6 mtk-card__column" aria-label="Original locksmith business card">
        <img class="mtk-card__reference-image" data-mtk-card-image alt="">
      </article>
    </div>
  </section>
</mtk-card>
