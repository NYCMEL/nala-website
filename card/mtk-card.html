<mtk-card class="mtk-card">
  <section class="mtk-card__comparison container-fluid" aria-label="Business card comparison">
    <div class="row g-4 align-items-start justify-content-center">
      <article class="col-md-6 mtk-card__column" aria-label="Generated business card">
        <div class="mtk-card__business-card" tabindex="0">
          <div class="mtk-card__logo-mark" aria-hidden="true">
            <span class="mtk-card__key-head"></span>
            <span class="mtk-card__key-hole"></span>
            <span class="mtk-card__key-shaft"></span>
          </div>

          <div class="mtk-card__field mtk-card__field--logo">
            <span class="mtk-card__text" data-text="logoText"></span>
            <span class="mtk-card__label" data-label="logoText" tabindex="0"></span>
          </div>

          <div class="mtk-card__field mtk-card__field--person-name">
            <span class="mtk-card__text" data-text="personName"></span>
            <span class="mtk-card__label" data-label="personName" tabindex="0"></span>
          </div>

          <div class="mtk-card__field mtk-card__field--person-title">
            <span class="mtk-card__text" data-text="personTitle"></span>
            <span class="mtk-card__label" data-label="personTitle" tabindex="0"></span>
          </div>

          <div class="mtk-card__field mtk-card__field--company">
            <span class="mtk-card__text" data-text="companyName"></span>
            <span class="mtk-card__label" data-label="companyName" tabindex="0"></span>
          </div>

          <address class="mtk-card__address" aria-label="Business address">
            <div class="mtk-card__field mtk-card__field--address">
              <span class="mtk-card__text" data-text="addressLine1"></span>
              <span class="mtk-card__label" data-label="addressLine1" tabindex="0"></span>
            </div>

            <div class="mtk-card__field mtk-card__field--address">
              <span class="mtk-card__text" data-text="addressLine2"></span>
              <span class="mtk-card__label" data-label="addressLine2" tabindex="0"></span>
            </div>
          </address>

          <div class="mtk-card__contact" aria-label="Business contact information">
            <div class="mtk-card__field mtk-card__field--phone">
              <span class="mtk-card__text">
                <span data-text="phonePrefix"></span>
                <span data-text="phone"></span>
              </span>
              <span class="mtk-card__label" data-label="phone" tabindex="0"></span>
            </div>

            <div class="mtk-card__field mtk-card__field--email">
              <span class="mtk-card__text" data-text="email"></span>
              <span class="mtk-card__label" data-label="email" tabindex="0"></span>
            </div>
          </div>
        </div>
      </article>

      <article class="col-md-6 mtk-card__column" aria-label="Original business card">
        <img class="mtk-card__reference-image" data-card-image alt="Original locksmith business card">
      </article>
    </div>
  </section>
</mtk-card>
